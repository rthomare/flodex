# Fly.io config for the flodex coordinator.
#
# `app` is left as a placeholder. Either:
#   - run `fly launch --copy-config --no-deploy` (Fly will pick a name +
#     region for you and rewrite this file), or
#   - edit `app` below and pick `primary_region` from `fly platform regions`,
#     then run `fly deploy`.

app = "flodex"           # rename to whatever's free in your Fly org
primary_region = "iad"                # us-east. fly platform regions for alternatives

[build]
  dockerfile = "apps/coordinator/Dockerfile"

[env]
  RUST_LOG = "info,tower_http=info"

# A single HTTP service, TLS terminated by Fly. Auto-stop scales to 0 when
# idle so the free-tier credits last; first request after idle wakes it up
# in ~1s (Rust binaries cold-start fast).
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/nodes"

# 256MB RAM is plenty — coordinator state is in-memory but tiny (one entry
# per registered node). Bump `cpu_kind` to "performance" if first-byte
# latency matters more than cost.
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
