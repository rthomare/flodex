# fly.toml — fldx coordinator. See https://fly.io/docs/reference/configuration/.

app = 'fldx-coordinator'
primary_region = 'iad'

[build]
  dockerfile = 'apps/coordinator/Dockerfile'

[env]
  RUST_LOG = 'info,tower_http=info'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/nodes'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
